<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倒數計時GoGo</title>
    <style>
        :root {
            --primary-color: #3498db;
            --success-color: #2ecc71;
            --warning-color: #f1c40f;
            --danger-color: #e74c3c;
            --bg-color: #ecf0f1;
        }

        body {
            font-family: "PingFang TC", "Helvetica Neue", Helvetica, Arial, "Microsoft JhengHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: #333;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 650px;
            transition: all 0.3s ease;
        }

        h1 { margin-top: 0; color: #2c3e50; }

        .control-panel {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        input {
            padding: 12px;
            font-size: 1.1rem;
            width: 100px;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 120px;
        }

        button:active { transform: scale(0.97); }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        #start-btn { background-color: var(--success-color); }
        #start-btn:hover:not(:disabled) { background-color: #27ae60; }

        #pause-btn { background-color: var(--warning-color); color: #333; }
        #pause-btn:hover:not(:disabled) { background-color: #f39c12; }
        #pause-btn.resume { background-color: var(--primary-color); color: white; }

        #reset-btn { background-color: #95a5a6; }
        #reset-btn:hover { background-color: #7f8c8d; }

        #timer-display {
            font-size: 5rem;
            font-weight: bold;
            margin: 15px 0;
            font-family: 'Courier New', Courier, monospace; /* 確保數字寬度一致 */
            color: #2c3e50;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* 賽道與小車容器 */
        #track-container {
            width: 100%;
            height: 120px;
            background: #333; /* 柏油路顏色 */
            border-radius: 60px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
            border: 6px solid #555;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.5);
        }

        /* 路面中心線 */
        #track-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 4px;
            background: repeating-linear-gradient(90deg, #fff, #fff 20px, transparent 20px, transparent 40px);
            transform: translateY(-50%);
            z-index: 1;
        }

        #car-canvas {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 2; /* 在中心線上方 */
        }

        .finish-line {
            position: absolute;
            right: 20px;
            top: 10px;
            bottom: 10px;
            width: 15px;
            background: repeating-linear-gradient(
                0deg,
                #000,
                #000 15px,
                #fff 15px,
                #fff 30px
            );
            border: 2px solid white;
            z-index: 1;
            border-radius: 4px;
        }
        
        #status-text {
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 10px;
            color: #7f8c8d;
        }

        .tense {
            color: var(--danger-color) !important;
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>倒數計時GoGo</h1>
    
    <div class="control-panel">
        <input type="number" id="seconds-input" min="3" value="10" placeholder="秒數">
        <button id="start-btn">開始競賽</button>
        <button id="pause-btn" disabled>暫停</button>
        <button id="reset-btn">重設</button>
    </div>

    <div id="timer-display">00:10.00</div>

    <div id="track-container">
        <canvas id="car-canvas"></canvas>
        <div class="finish-line"></div>
    </div>
    
    <p id="status-text">準備好參加比賽了嗎？</p>
</div>

<script>
    // --- DOM 元素 ---
    const canvas = document.getElementById('car-canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('start-btn');
    const pauseBtn = document.getElementById('pause-btn');
    const resetBtn = document.getElementById('reset-btn');
    const secondsInput = document.getElementById('seconds-input');
    const display = document.getElementById('timer-display');
    const statusText = document.getElementById('status-text');

    // --- 狀態變數 ---
    let totalTimeMs = 0;      // 總時間 (毫秒)
    let timeRemainingMs = 0;  // 剩餘時間 (毫秒)
    let startTime = 0;        // 當前階段開始的時間戳
    let baseTimeRemaining = 0;// 暫停時記錄的剩餘時間

    let isRunning = false;
    let isPaused = false;
    let animationFrameId = null;
    let audioLoopIntervalId = null;

    // --- 音訊上下文 ---
    let audioCtx = null;

    // --- 初始化 ---
    function initCanvas() {
        // 處理高 DPI 螢幕，讓繪圖清晰
        const scale = window.devicePixelRatio || 1;
        canvas.width = canvas.offsetWidth * scale;
        canvas.height = canvas.offsetHeight * scale;
        ctx.scale(scale, scale);
    }
    window.addEventListener('resize', initCanvas);
    initCanvas();
    drawCar(0); // 初始繪製

    // --- 核心邏輯：動畫循環 (實現絲滑移動) ---
    function animationLoop(timestamp) {
        if (!isRunning || isPaused) return;

        if (!startTime) startTime = timestamp;
        
        // 計算自本次「開始」或「繼續」以來經過的時間
        const elapsedSinceStart = timestamp - startTime;
        
        // 真正的剩餘時間 = 基礎剩餘時間 - 本次經過時間
        timeRemainingMs = baseTimeRemaining - elapsedSinceStart;

        if (timeRemainingMs <= 0) {
            timeRemainingMs = 0;
            drawCar(1); // 確保停在終點
            updateDisplay(0);
            finishRace();
            return;
        }

        // 計算進度 (0.0 到 1.0)
        const progress = 1 - (timeRemainingMs / totalTimeMs);
        
        // 繪製小車
        drawCar(progress);
        // 更新數字顯示
        updateDisplay(timeRemainingMs);

        // 請求下一幀
        animationFrameId = requestAnimationFrame(animationLoop);
    }

    // --- 繪製小車 (Canvas) ---
    function drawCar(progress) {
        // 取得實際邏輯尺寸，非 Canvas 像素尺寸
        const logicalWidth = canvas.width / (window.devicePixelRatio || 1);
        const logicalHeight = canvas.height / (window.devicePixelRatio || 1);

        ctx.clearRect(0, 0, logicalWidth, logicalHeight);
        
        // 計算 X 位置：起點在左側，終點在 finish-line 之前
        const carWidth = 60;
        const finishLinePos = logicalWidth - 40; // 終點線位置
        const startPos = 20;
        const availableDistance = finishLinePos - startPos - carWidth;
        
        const x = startPos + (progress * availableDistance);
        const y = logicalHeight / 2 - 10; // 垂直置中調整

        // 繪製車影
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(x + carWidth/2 + 5, y + 25, 30, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        // 繪製車身 (紅色跑車)
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath();
        ctx.moveTo(x, y + 10);
        ctx.lineTo(x + 5, y);
        ctx.lineTo(x + carWidth - 15, y);
        ctx.lineTo(x + carWidth, y + 15);
        ctx.lineTo(x + carWidth, y + 25);
        ctx.lineTo(x, y + 25);
        ctx.closePath();
        ctx.fill();

        // 車頂/車窗
        ctx.fillStyle = '#34495e';
        ctx.beginPath();
        ctx.moveTo(x + 15, y + 2);
        ctx.lineTo(x + carWidth - 22, y + 2);
        ctx.lineTo(x + carWidth - 10, y + 12);
        ctx.lineTo(x + 10, y + 12);
        ctx.closePath();
        ctx.fill();

        // 輪胎
        ctx.fillStyle = '#2c3e50';
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#fff';
        // 後輪
        ctx.beginPath(); ctx.arc(x + 15, y + 25, 8, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        // 前輪
        ctx.beginPath(); ctx.arc(x + carWidth - 15, y + 25, 8, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    }

    // --- 更新時間顯示 (分:秒.毫秒) ---
    function updateDisplay(ms) {
        const totalSeconds = ms / 1000;
        const mins = Math.floor(totalSeconds / 60);
        const secs = Math.floor(totalSeconds % 60);
        const mads = Math.floor((ms % 1000) / 10); // 取得兩位毫秒

        display.innerText = 
            `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}.${mads.toString().padStart(2, '0')}`;
            
        // 介面反饋：最後五秒變紅
        if (totalSeconds <= 5 && totalSeconds > 0) {
            display.classList.add('tense');
            statusText.innerText = "最後衝刺！！";
            statusText.classList.add('tense');
        } else if (totalSeconds > 5) {
            display.classList.remove('tense');
            statusText.classList.remove('tense');
        }
    }

    // --- 音訊控制 (Web Audio API) ---
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    // 播放單次音效 (抵達鈴聲)
    function playFinishSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;
        osc.type = 'triangle'; // 鈴聲感
        osc.frequency.setValueAtTime(1500, now);
        osc.frequency.exponentialRampToValueAtTime(1000, now + 0.5);
        
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.3, now + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 2);

        osc.start(now);
        osc.stop(now + 2);
    }

    // 播放循環背景音樂 (輕鬆/緊張)
    function playLoopingMusic(type) {
        if (!audioCtx) return;
        
        // 建立振盪器與增益節點
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        const now = audioCtx.currentTime;

        if (type === 'happy') {
            // 輕鬆愉快：Bossa Nova 風格的小調式調式
            osc.type = 'sine';
            const notes = [261.63, 329.63, 392.00, 523.25]; // C, E, G, C5
            const note = notes[Math.floor(Math.random() * notes.length)];
            osc.frequency.setValueAtTime(note, now);
            
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.08, now + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
            osc.stop(now + 0.5);
        } else if (type === 'tense') {
            // 緊張：不協和的高音警報
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(880, now); // A5
            osc.frequency.linearRampToValueAtTime(1760, now + 0.08); // 滑音
            
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.04, now + 0.01);
            gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.stop(now + 0.12);
        }
        
        osc.start(now);
    }

    // 管理音樂循環
    function startMusicLoop() {
        stopMusicLoop(); // 確保沒有舊的循環
        if (!isRunning || isPaused) return;

        function tick() {
            if (!isRunning || isPaused) {
                stopMusicLoop();
                return;
            }
            
            const currentSeconds = timeRemainingMs / 1000;
            if (currentSeconds > 0) {
                if (currentSeconds <= 5) {
                    playLoopingMusic('tense');
                    audioLoopIntervalId = setTimeout(tick, 150); // 緊張時節奏變快
                } else {
                    playLoopingMusic('happy');
                    audioLoopIntervalId = setTimeout(tick, 500); // 輕鬆時節奏慢
                }
            }
        }
        tick();
    }

    function stopMusicLoop() {
        if (audioLoopIntervalId) {
            clearTimeout(audioLoopIntervalId);
            audioLoopIntervalId = null;
        }
    }

    // --- 流程控制 ---

    function startRace() {
        initAudio();
        const inputSecs = parseInt(secondsInput.value);
        if (isNaN(inputSecs) || inputSecs < 3) {
            alert("請輸入至少 3 秒的時間。");
            return;
        }

        // 狀態初始化
        totalTimeMs = inputSecs * 1000;
        baseTimeRemaining = totalTimeMs;
        timeRemainingMs = totalTimeMs;
        startTime = null; // 將在 animationLoop 中設定
        isRunning = true;
        isPaused = false;

        // UI 調整
        startBtn.disabled = true;
        pauseBtn.disabled = false;
        pauseBtn.innerText = "暫停";
        pauseBtn.classList.remove('resume');
        secondsInput.disabled = true;
        statusText.innerText = "比賽開始！衝啊！";
        statusText.classList.remove('tense');

        // 啟動動畫與音樂
        animationFrameId = requestAnimationFrame(animationLoop);
        startMusicLoop();
    }

    function togglePause() {
        if (!isRunning) return;

        if (!isPaused) {
            // --- 執行暫停 ---
            isPaused = true;
            // 記錄當前剩餘時間，作為下次繼續的基礎
            baseTimeRemaining = timeRemainingMs;
            
            // 停止動畫與音樂
            cancelAnimationFrame(animationFrameId);
            stopMusicLoop();

            // UI 更新
            pauseBtn.innerText = "繼續";
            pauseBtn.classList.add('resume');
            statusText.innerText = "比賽暫停中...";
            display.classList.remove('tense'); // 暫停時停止閃爍
        } else {
            // --- 執行繼續 ---
            isPaused = false;
            startTime = null; // 讓 animationLoop 重新計算起點

            // 重新啟動動畫與音樂
            animationFrameId = requestAnimationFrame(animationLoop);
            startMusicLoop();

            // UI 更新
            pauseBtn.innerText = "暫停";
            pauseBtn.classList.remove('resume');
            statusText.innerText = "比賽繼續！";
        }
    }

    function finishRace() {
        isRunning = false;
        isPaused = false;
        stopMusicLoop();
        cancelAnimationFrame(animationFrameId);
        playFinishSound();

        // UI 狀態
        startBtn.disabled = false;
        pauseBtn.disabled = true;
        secondsInput.disabled = false;
        display.classList.remove('tense');
        statusText.classList.remove('tense');
        statusText.innerText = "完美的抵達終點！";
    }

    function resetRace() {
        isRunning = false;
        isPaused = false;
        stopMusicLoop();
        cancelAnimationFrame(animationFrameId);
        
        // 恢復初始 UI
        const inputSecs = secondsInput.value || 10;
        updateDisplay(inputSecs * 1000);
        drawCar(0);
        
        startBtn.disabled = false;
        pauseBtn.disabled = true;
        pauseBtn.innerText = "暫停";
        pauseBtn.classList.remove('resume');
        secondsInput.disabled = false;
        display.classList.remove('tense');
        statusText.classList.remove('tense');
        statusText.innerText = "準備好參加比賽了嗎？";
    }

    // --- 事件監聽 ---
    startBtn.addEventListener('click', startRace);
    pauseBtn.addEventListener('click', togglePause);
    resetBtn.addEventListener('click', resetRace);

    // 監聽輸入框變化，即時更新顯示
    secondsInput.addEventListener('input', () => {
        if (!isRunning) {
            const secs = parseInt(secondsInput.value);
            if (!isNaN(secs) && secs >= 0) {
                updateDisplay(secs * 1000);
            }
        }
    });
</script>

</body>
</html>
