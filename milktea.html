<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>溫柔奶油色倒數計時器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #FDFBF7; /* 奶油底色 */
            color: #5D534A; /* 柔和深咖文字 */
        }
        .cream-card {
            background-color: #FFFFFF;
            border: 1px solid #F3E9DC;
            box-shadow: 0 10px 25px -5px rgba(230, 213, 184, 0.3);
        }
        .progress-container {
            background-color: #F3E9DC;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar {
            background-color: #DBC8A7; /* 進度條主色 */
            height: 100%;
            width: 0%;
            /* 絲滑感關鍵：1秒線性過渡，對應計時器的1秒間隔 */
            transition: width 1s linear;
        }

        /* 奶茶色調按鈕系列 */
        .btn-start {
            background-color: #E6D5B8; /* 淺奶茶 */
            color: #5D534A;
        }
        .btn-start:hover { background-color: #DBC8A7; }

        .btn-reset {
            background-color: #D2B48C; /* 中奶茶 */
            color: #FFFFFF;
        }
        .btn-reset:hover { background-color: #C19A6B; }

        .btn-end {
            background-color: #A68966; /* 深奶茶 */
            color: #FFFFFF;
        }
        .btn-end:hover { background-color: #8E7352; }

        .input-field {
            background-color: #FDFBF7;
            border: 1px solid #E6D5B8;
            color: #5D534A;
            text-align: center;
        }
        .input-field:focus {
            outline: none;
            border-color: #DBC8A7;
            box-shadow: 0 0 0 2px rgba(219, 200, 167, 0.2);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="cream-card w-full max-w-md rounded-3xl p-8 md:p-10">
        <h1 class="text-2xl font-bold text-center mb-8 tracking-wider">倒數計時</h1>
        
        <!-- 時間設定區 -->
        <div id="setup-view" class="space-y-6">
            <div class="flex justify-center items-end space-x-4">
                <div class="flex flex-col items-center">
                    <span class="text-xs text-gray-400 mb-1">分鐘</span>
                    <input type="number" id="min-input" min="0" max="99" value="0" 
                           class="input-field w-20 h-16 text-3xl rounded-2xl">
                </div>
                <span class="text-3xl mb-3">:</span>
                <div class="flex flex-col items-center">
                    <span class="text-xs text-gray-400 mb-1">秒鐘</span>
                    <input type="number" id="sec-input" min="0" max="59" value="0" 
                           class="input-field w-20 h-16 text-3xl rounded-2xl">
                </div>
            </div>
        </div>

        <!-- 倒數顯示區 -->
        <div id="timer-view" class="hidden text-center">
            <div id="timer-display" class="text-7xl font-light mb-8 tabular-nums tracking-tight">
                00:00
            </div>
            
            <!-- 進度條 -->
            <div class="progress-container mb-8">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
        </div>

        <!-- 按鈕控制區 -->
        <div class="grid grid-cols-3 gap-3 mt-10">
            <button id="start-btn" class="btn-start py-3 rounded-2xl font-medium transition-all">
                開始
            </button>
            <button id="reset-btn" class="btn-reset py-3 rounded-2xl font-medium transition-all">
                重置
            </button>
            <button id="end-btn" class="btn-end py-3 rounded-2xl font-medium transition-all">
                結束
            </button>
        </div>

        <!-- 訊息提示 -->
        <div id="message-box" class="mt-6 text-center text-sm text-gray-400 opacity-0 transition-opacity">
            時間到囉！休息一下吧。
        </div>
    </div>

    <script>
        let timer = null;
        let totalSeconds = 0;
        let remainingSeconds = 0;
        let isRunning = false;

        const setupView = document.getElementById('setup-view');
        const timerView = document.getElementById('timer-view');
        const timerDisplay = document.getElementById('timer-display');
        const progressBar = document.getElementById('progress-bar');
        const minInput = document.getElementById('min-input');
        const secInput = document.getElementById('sec-input');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const endBtn = document.getElementById('end-btn');
        const messageBox = document.getElementById('message-box');

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function updateUI(immediate = false) {
            timerDisplay.textContent = formatTime(remainingSeconds);
            const progress = totalSeconds > 0 ? ((totalSeconds - remainingSeconds) / totalSeconds) * 100 : 0;
            
            // 如果是重置或結束，暫時關閉 transition 讓進度條瞬間歸零
            if (immediate) {
                progressBar.style.transition = 'none';
                progressBar.style.width = `${progress}%`;
                // 強制瀏覽器重繪
                progressBar.offsetHeight;
                progressBar.style.transition = 'width 1s linear';
            } else {
                progressBar.style.width = `${progress}%`;
            }
        }

        function startTimer() {
            if (isRunning) {
                pauseTimer();
                return;
            }

            if (remainingSeconds === 0) {
                const mins = parseInt(minInput.value) || 0;
                const secs = parseInt(secInput.value) || 0;
                totalSeconds = mins * 60 + secs;
                remainingSeconds = totalSeconds;
            }

            if (remainingSeconds <= 0) return;

            // 進入計時模式，立即更新 UI 並切換畫面
            updateUI(true); 
            setupView.classList.add('hidden');
            timerView.classList.remove('hidden');
            messageBox.style.opacity = '0';
            
            isRunning = true;
            startBtn.textContent = '暫停';

            timer = setInterval(() => {
                remainingSeconds--;
                updateUI();

                if (remainingSeconds <= 0) {
                    clearInterval(timer);
                    isRunning = false;
                    startBtn.textContent = '開始';
                    messageBox.style.opacity = '1';
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timer);
            isRunning = false;
            startBtn.textContent = '繼續';
            // 暫停時將過渡效果改為 0.3s，讓視覺上停得比較準確
            progressBar.style.transition = 'width 0.3s ease-out';
        }

        function resetTimer() {
            clearInterval(timer);
            isRunning = false;
            
            const mins = parseInt(minInput.value) || 0;
            const secs = parseInt(secInput.value) || 0;
            totalSeconds = mins * 60 + secs;
            remainingSeconds = totalSeconds;
            
            startBtn.textContent = '開始';
            messageBox.style.opacity = '0';
            updateUI(true); // 瞬間重置進度條
        }

        function endTimer() {
            clearInterval(timer);
            isRunning = false;
            remainingSeconds = 0;
            totalSeconds = 0;
            
            startBtn.textContent = '開始';
            setupView.classList.remove('hidden');
            timerView.classList.add('hidden');
            messageBox.style.opacity = '0';
            updateUI(true); // 瞬間重置進度條
        }

        startBtn.addEventListener('click', startTimer);
        resetBtn.addEventListener('click', resetTimer);
        endBtn.addEventListener('click', endTimer);

        minInput.addEventListener('change', () => {
            if (minInput.value < 0) minInput.value = 0;
            if (minInput.value > 99) minInput.value = 99;
        });
        secInput.addEventListener('change', () => {
            if (secInput.value < 0) secInput.value = 0;
            if (secInput.value > 59) secInput.value = 59;
        });
    </script>
</body>
</html>
